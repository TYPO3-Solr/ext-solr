{namespace solr=ApacheSolrForTypo3\Solr\ViewHelpers}
{namespace core=TYPO3\CMS\Core\ViewHelpers}
<f:layout name="Backend/WithPageTree"/>

<f:section name="Main">
	<f:be.pageRenderer includeCssFiles="{0: 'EXT:solr/Resources/Public/StyleSheets/Backend/IndexAdministrationModule.css'}" includeJavaScriptModules="{0: '@apache-solr-for-typo3/solr/FormModal.js'}"/>
	<f:variable name="confirmTitle"><f:translate key="modal.confirm.title" domain="solr.modules.index_admin"/></f:variable>
	<f:variable name="emptyIndexConfirmation"><f:translate key="modal.emptyIndex.content" domain="solr.modules.index_admin"/></f:variable>
	<f:variable name="clearQueueConfirmation"><f:translate key="modal.clearQueue.content" domain="solr.modules.index_admin"/></f:variable>

	<div class="solr-index-admin-module">
		<header class="solr-index-admin-module__intro">
			<h1><f:translate key="title" domain="solr.modules.index_admin"/></h1>
			<p class="lead"><f:translate key="description" domain="solr.modules.index_admin"/></p>
		</header>

		<div class="card-container solr-index-admin-module__cards">
			<section class="card card-size-small solr-index-admin-module__card">
				<div class="card-header">
					<div class="card-icon">
						<core:icon identifier="actions-database-reload" size="medium" alternativeMarkupIdentifier="inline"/>
					</div>
					<div class="card-header-body">
						<h2 class="card-title"><f:translate key="card.reload.title" domain="solr.modules.index_admin"/></h2>
						<span class="card-subtitle"><f:translate key="card.reload.subtitle" domain="solr.modules.index_admin"/></span>
					</div>
				</div>
				<div class="card-body">
					<p class="card-text">
						<f:translate key="card.reload.description" domain="solr.modules.index_admin"/>
					</p>
				</div>
				<div class="card-footer">
					<f:form action="reloadIndexConfiguration">
						<f:form.button type="submit" class="btn btn-sm btn-default">
							<core:icon identifier="actions-refresh" size="small"/>
							<f:translate key="card.reload.button" domain="solr.modules.index_admin"/>
						</f:form.button>
					</f:form>
				</div>
			</section>

			<section class="card card-size-small solr-index-admin-module__card solr-index-admin-module__card--danger">
				<div class="card-header">
					<div class="card-icon">
						<core:icon identifier="actions-database" size="medium" alternativeMarkupIdentifier="inline"/>
					</div>
					<div class="card-header-body">
						<h2 class="card-title"><f:translate key="card.emptyIndex.title" domain="solr.modules.index_admin"/></h2>
						<span class="card-subtitle"><f:translate key="card.emptyIndex.subtitle" domain="solr.modules.index_admin"/></span>
					</div>
				</div>
				<div class="card-body">
					<p class="card-text">
						<f:translate key="card.emptyIndex.description" domain="solr.modules.index_admin"/>
					</p>
				</div>
				<div class="card-footer">
					<f:form action="emptyIndex" method="POST">
						<f:form.button type="submit"
									   class="btn btn-sm btn-default btn-danger t3js-modal-formsubmit-trigger"
									   data="{title: confirmTitle, content: emptyIndexConfirmation, severity: 'warning'}">
							<core:icon identifier="actions-delete" size="small"/>
							<f:translate key="card.emptyIndex.button" domain="solr.modules.index_admin"/>
						</f:form.button>
					</f:form>
				</div>
			</section>

			<section class="card card-size-small solr-index-admin-module__card solr-index-admin-module__card--danger">
				<div class="card-header">
					<div class="card-icon">
						<core:icon identifier="actions-list" size="medium" alternativeMarkupIdentifier="inline"/>
					</div>
					<div class="card-header-body">
						<h2 class="card-title">
							<f:translate key="card.clearQueue.title" domain="solr.modules.index_admin"/>
						</h2>
						<span class="card-subtitle"><f:translate key="card.clearQueue.subtitle" domain="solr.modules.index_admin"/></span>
					</div>
				</div>
				<div class="card-body">
					<p class="card-text">
						<f:translate key="card.clearQueue.description" domain="solr.modules.index_admin"/>
					</p>
				</div>
				<div class="card-footer">
					<f:form action="clearIndexQueue" method="POST">
						<f:form.button type="submit"
									   class="btn btn-sm btn-default btn-danger t3js-modal-formsubmit-trigger"
									   data="{title: confirmTitle, content: clearQueueConfirmation, severity: 'warning'}">
							<core:icon identifier="actions-delete" size="small"/>
							<f:translate key="card.clearQueue.button" domain="solr.modules.index_admin"/>
						</f:form.button>
					</f:form>
				</div>
			</section>
		</div>
	</div>
</f:section>
