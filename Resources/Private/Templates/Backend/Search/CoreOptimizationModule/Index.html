{namespace solr=ApacheSolrForTypo3\Solr\ViewHelpers}
{namespace core=TYPO3\CMS\Core\ViewHelpers}

<f:layout name="Backend/WithPageTree"/>

<f:section name="Main">
    <f:be.pageRenderer includeCssFiles="{0: 'EXT:solr/Resources/Public/StyleSheets/Backend/CoreOptimizationModule.css'}"/>

    <div class="tab-wrapper solr-core-optimization-module">
        <header class="solr-core-optimization-module__intro">
            <h1><f:translate key="module.heading" domain="solr.modules.core_optimization"/></h1>
            <p class="lead"><f:translate key="module.teaser" domain="solr.modules.core_optimization"/></p>
        </header>

        <ul class="nav nav-tabs" role="tablist" id="tabs-tab" data-store-last-tab="1">
            <li role="presentation" class="nav-item">
                <button type="button" id="synonyms-tab-button" class="nav-link active" data-typo3-tab="#synonyms-tab" aria-controls="synonyms-tab" aria-selected="true" tabindex="0" role="tab">
                    <f:translate key="tabs.synonyms" domain="solr.modules.core_optimization"/>
                </button>
            </li>
            <li role="presentation" class="nav-item">
                <button type="button" id="stopwords-tab-button" class="nav-link" data-typo3-tab="#stopwords-tab" aria-controls="stopwords-tab" aria-selected="false" tabindex="-1" role="tab">
                    <f:translate key="tabs.stopWords" domain="solr.modules.core_optimization"/>
                </button>
            </li>
        </ul>
        <div class="tab-content">
            <div role="tabpanel" class="tab-pane active" id="synonyms-tab" aria-labelledby="synonyms-tab-button">
                <div class="panel panel-tab">
                    <div class="panel-body">

                        <f:render section="Synonyms" arguments="{_all}"/>

                    </div>
                </div>
            </div>
            <div role="tabpanel" class="tab-pane" id="stopwords-tab" aria-labelledby="stopwords-tab-button">
                <div class="panel panel-tab">
                    <div class="panel-body">

                        <f:render section="StopWords" arguments="{_all}"/>

                    </div>
                </div>
            </div>
        </div>
    </div>
</f:section>

<f:section name="Synonyms">
    <div class="panel panel-default solr-core-optimization-module__guide">
        <div class="panel-heading">
            <h2 class="panel-title"><f:translate key="synonyms.guide.title" domain="solr.modules.core_optimization"/></h2>
        </div>
        <div class="panel-body">
            <p class="solr-core-optimization-module__lead">
                <f:translate key="synonyms.guide.intro" domain="solr.modules.core_optimization"/>
            </p>
            <p>
                <strong><f:translate key="synonyms.guide.note.label" domain="solr.modules.core_optimization"/></strong>
                <f:translate key="synonyms.guide.note" domain="solr.modules.core_optimization"/>
            </p>

            <div class="solr-core-optimization-module__example solr-core-optimization-module__example--definition" role="group" aria-label="{f:translate(key: 'synonyms.example.title', domain: 'solr.modules.core_optimization')}">
                <div class="solr-core-optimization-module__example-row">
                    <span class="solr-core-optimization-module__example-label"><f:translate key="synonyms.example.base" domain="solr.modules.core_optimization"/></span>
                    <code>"smartphone"</code>
                </div>
                <div class="solr-core-optimization-module__example-row">
                    <span class="solr-core-optimization-module__example-label"><f:translate key="synonyms.example.mapping" domain="solr.modules.core_optimization"/></span>
                    <code>"smartphone" =&gt; "smartphone, cellphone, mobile, mobile phone"</code>
                </div>
                <div class="solr-core-optimization-module__example-row">
                    <span class="solr-core-optimization-module__example-label"><f:translate key="synonyms.example.result" domain="solr.modules.core_optimization"/></span>
                    <span class="solr-core-optimization-module__example-value"><f:translate key="synonyms.example.resultText" domain="solr.modules.core_optimization"/></span>
                </div>
            </div>

            <p class="solr-core-optimization-module__hint">
                <f:translate key="synonyms.guide.reindexNote" domain="solr.modules.core_optimization"/>
            </p>
        </div>
    </div>

    <f:if condition="{synonyms}">
        <f:then>
            <section class="panel panel-default solr-core-optimization-module__section">
                <div class="panel-heading">
                    <div class="solr-core-optimization-module__section-header">
                        <h3 class="panel-title"><f:translate key="synonyms.manage.title" domain="solr.modules.core_optimization"/></h3>
                        <div class="btn-group">
                            <f:link.action action="exportSynonyms" title="{f:translate(key: 'synonyms.action.exportAll', domain: 'solr.modules.core_optimization')}" class="btn btn-default btn-sm">
                                <core:icon identifier="actions-document-export-csv" size="small"/>
                                <f:translate key="synonyms.action.exportAll" domain="solr.modules.core_optimization"/>
                            </f:link.action>
                            <f:link.action action="deleteAllSynonyms" title="{f:translate(key: 'synonyms.action.deleteAll', domain: 'solr.modules.core_optimization')}" class="btn btn-default btn-sm">
                                <core:icon identifier="actions-edit-delete" size="small"/>
                                <f:translate key="synonyms.action.deleteAll" domain="solr.modules.core_optimization"/>
                            </f:link.action>
                        </div>
                    </div>
                </div>
                <div class="table-fit">
                    <table class="table table-hover table-striped">
                        <thead>
                            <tr>
                                <th scope="col"><f:translate key="synonyms.table.baseWord" domain="solr.modules.core_optimization"/></th>
                                <th scope="col"><f:translate key="synonyms.table.synonyms" domain="solr.modules.core_optimization"/></th>
                                <th scope="col" class="col-control"><f:translate key="synonyms.table.actions" domain="solr.modules.core_optimization"/></th>
                            </tr>
                        </thead>
                        <tbody>
                        <f:for each="{synonyms}" key="baseWord" as="synonymList">
                            <tr>
                                <td><code>{baseWord}</code></td>
                                <td>{synonymList}</td>
                                <td class="col-control">
                                    <f:link.action action="deleteSynonyms" arguments="{baseWord:'{baseWord}'}" title="{f:translate(key: 'synonyms.action.deleteMapping', domain: 'solr.modules.core_optimization')}" class="btn btn-default btn-sm">
                                        <core:icon identifier="actions-edit-delete" size="small"/>
                                        <span class="visually-hidden"><f:translate key="synonyms.action.deleteMapping" domain="solr.modules.core_optimization"/></span>
                                    </f:link.action>
                                </td>
                            </tr>
                        </f:for>
                        </tbody>
                    </table>
                </div>
            </section>
        </f:then>
        <f:else>
            <f:be.infobox title="{f:translate(key: 'synonyms.empty.title', domain: 'solr.modules.core_optimization')}" state="-1">
                <f:translate key="synonyms.empty.message" domain="solr.modules.core_optimization"/>
            </f:be.infobox>
        </f:else>
    </f:if>

    <div class="solr-core-optimization-module__form-grid">
        <section class="panel panel-default solr-core-optimization-module__section">
            <div class="panel-heading">
                <h3 class="panel-title"><f:translate key="synonyms.add.title" domain="solr.modules.core_optimization"/></h3>
            </div>
            <div class="panel-body">
                <f:form action="addSynonyms" id="add-synonyms">
                    <div class="form-group">
                        <label class="form-label" for="baseWord"><f:translate key="synonyms.add.baseWord" domain="solr.modules.core_optimization"/></label>
                        <f:form.textfield id="baseWord" name="baseWord" class="form-control"/>
                        <div class="form-text"><f:translate key="synonyms.add.baseWord.help" domain="solr.modules.core_optimization"/></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="synonyms"><f:translate key="synonyms.add.synonyms" domain="solr.modules.core_optimization"/></label>
                        <f:form.textfield id="synonyms" name="synonyms" class="form-control"/>
                        <div class="form-text"><f:translate key="synonyms.add.synonyms.help" domain="solr.modules.core_optimization"/></div>
                    </div>
                    <div class="form-check">
                        <f:form.checkbox id="overrideExistingSingle" name="overrideExisting" value="1" class="form-check-input"/>
                        <label class="form-check-label" for="overrideExistingSingle"><f:translate key="synonyms.add.overrideExisting" domain="solr.modules.core_optimization"/></label>
                    </div>
                    <div class="solr-core-optimization-module__actions">
                        <f:form.button type="submit" class="btn btn-sm btn-primary">
                            <core:icon identifier="actions-plus" size="small"/>
                            <f:translate key="synonyms.add.submit" domain="solr.modules.core_optimization"/>
                        </f:form.button>
                    </div>
                </f:form>
            </div>
        </section>

        <section class="panel panel-default solr-core-optimization-module__section">
            <div class="panel-heading">
                <h3 class="panel-title"><f:translate key="synonyms.upload.title" domain="solr.modules.core_optimization"/></h3>
            </div>
            <div class="panel-body">
                <f:form action="importSynonymList" id="upload-synonyms" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label class="form-label" for="synonymFileUpload"><f:translate key="synonyms.upload.file" domain="solr.modules.core_optimization"/></label>
                        <f:form.upload id="synonymFileUpload" name="synonymFileUpload" class="form-control"/>
                        <div class="form-text"><f:translate key="synonyms.upload.file.help" domain="solr.modules.core_optimization"/></div>
                    </div>
                    <div class="form-check">
                        <f:form.checkbox id="overrideExisting" name="overrideExisting" value="1" class="form-check-input"/>
                        <label class="form-check-label" for="overrideExisting"><f:translate key="synonyms.upload.overrideExisting" domain="solr.modules.core_optimization"/></label>
                    </div>
                    <div class="form-check">
                        <f:form.checkbox id="deleteSynonymsBefore" name="deleteSynonymsBefore" value="1" class="form-check-input"/>
                        <label class="form-check-label" for="deleteSynonymsBefore"><f:translate key="synonyms.upload.replaceAll" domain="solr.modules.core_optimization"/></label>
                    </div>
                    <div class="solr-core-optimization-module__actions">
                        <f:form.button type="submit" class="btn btn-sm btn-primary">
                            <core:icon identifier="actions-upload" size="small"/>
                            <f:translate key="synonyms.upload.submit" domain="solr.modules.core_optimization"/>
                        </f:form.button>
                    </div>
                </f:form>
            </div>
        </section>
    </div>
</f:section>

<f:section name="StopWords">
    <div class="panel panel-default solr-core-optimization-module__guide">
        <div class="panel-heading">
            <h2 class="panel-title"><f:translate key="stopWords.guide.title" domain="solr.modules.core_optimization"/></h2>
        </div>
        <div class="panel-body">
            <p class="solr-core-optimization-module__lead">
                <f:translate key="stopWords.guide.intro" domain="solr.modules.core_optimization"/>
            </p>
            <p>
                <f:translate key="stopWords.guide.format" domain="solr.modules.core_optimization"/>
            </p>
            <div class="solr-core-optimization-module__example solr-core-optimization-module__example--compact" role="group" aria-label="{f:translate(key: 'stopWords.guide.examples.label', domain: 'solr.modules.core_optimization')}">
                <span class="solr-core-optimization-module__example-label"><f:translate key="stopWords.guide.examples.label" domain="solr.modules.core_optimization"/></span>
                <code><f:translate key="stopWords.guide.examples.first" domain="solr.modules.core_optimization"/></code>
                <code><f:translate key="stopWords.guide.examples.second" domain="solr.modules.core_optimization"/></code>
                <code><f:translate key="stopWords.guide.examples.third" domain="solr.modules.core_optimization"/></code>
            </div>
            <p class="solr-core-optimization-module__hint">
                <f:translate key="stopWords.guide.reindexNote" domain="solr.modules.core_optimization"/>
            </p>
        </div>
    </div>

    <section class="panel panel-default solr-core-optimization-module__section">
        <div class="panel-heading">
            <div class="solr-core-optimization-module__section-header">
                <h3 class="panel-title"><f:translate key="stopWords.list.title" domain="solr.modules.core_optimization"/></h3>
                <f:if condition="{stopWordsCount} > 0">
                    <div class="btn-group">
                        <f:link.action action="exportStopWords" title="{f:translate(key: 'stopWords.action.export', domain: 'solr.modules.core_optimization')}" class="btn btn-default btn-sm">
                            <core:icon identifier="actions-document-export-csv" size="small"/>
                            <f:translate key="stopWords.action.export" domain="solr.modules.core_optimization"/>
                        </f:link.action>
                    </div>
                </f:if>
            </div>
        </div>
        <div class="panel-body">
            <f:if condition="{stopWordsCount} == 0">
                <f:be.infobox title="{f:translate(key: 'stopWords.empty.title', domain: 'solr.modules.core_optimization')}" state="-1">
                    <f:translate key="stopWords.empty.message" domain="solr.modules.core_optimization"/>
                </f:be.infobox>
            </f:if>

            <f:form action="saveStopWords" id="edit-stopwords">
                <div class="form-group">
                    <label class="form-label" for="stopWords"><f:translate key="stopWords.list.label" domain="solr.modules.core_optimization"/></label>
                    <f:form.textarea id="stopWords" name="stopWords" rows="14" class="form-control solr-core-optimization-module__textarea" value="{stopWords}"/>
                    <div class="form-text"><f:translate key="stopWords.list.help" domain="solr.modules.core_optimization"/></div>
                </div>
                <div class="solr-core-optimization-module__actions">
                    <f:form.button type="submit" class="btn btn-sm btn-primary">
                        <core:icon identifier="actions-save" size="small"/>
                        <f:translate key="stopWords.list.submit" domain="solr.modules.core_optimization"/>
                    </f:form.button>
                </div>
            </f:form>
        </div>
    </section>

    <section class="panel panel-default solr-core-optimization-module__section">
        <div class="panel-heading">
            <h3 class="panel-title"><f:translate key="stopWords.upload.title" domain="solr.modules.core_optimization"/></h3>
        </div>
        <div class="panel-body">
            <f:form action="importStopWordList" id="upload-stopwords" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label" for="stopwordsFileUpload"><f:translate key="stopWords.upload.file" domain="solr.modules.core_optimization"/></label>
                    <f:form.upload id="stopwordsFileUpload" name="stopwordsFileUpload" class="form-control"/>
                    <div class="form-text"><f:translate key="stopWords.upload.file.help" domain="solr.modules.core_optimization"/></div>
                </div>
                <div class="form-check">
                    <f:form.checkbox id="replaceStopwords" name="replaceStopwords" value="1" checked="1" class="form-check-input"/>
                    <label class="form-check-label" for="replaceStopwords"><f:translate key="stopWords.upload.replaceAll" domain="solr.modules.core_optimization"/></label>
                </div>
                <div class="solr-core-optimization-module__actions">
                    <f:form.button type="submit" class="btn btn-sm btn-primary">
                        <core:icon identifier="actions-upload" size="small"/>
                        <f:translate key="stopWords.upload.submit" domain="solr.modules.core_optimization"/>
                    </f:form.button>
                </div>
            </f:form>
        </div>
    </section>
</f:section>
