<html data-namespace-typo3-fluid="true"
	xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
	xmlns:acoBase="http://typo3.org/ns/Aco/AcoBase/ViewHelpers"
>
<f:if condition="{unsupportedEndpoints}">
	<p><f:translate key="LLL:EXT:solr/Resources/Private/Language/locallang_reports.xlf:report.textToVector.plugin.warning" /></p>
	<p><f:translate key="LLL:EXT:solr/Resources/Private/Language/locallang_reports.xlf:report.textToVector.warning.ignore" /></p>
</f:if>

<table class="table table-condensed table-hover table-striped">
	<f:for each="{endpoints}" as="endpoint">
		<tr class="{endpoint.status.cssClass}">
			<td>{endpoint.baseUrl}</td>
		</tr>
	</f:for>
</table>

</html>
