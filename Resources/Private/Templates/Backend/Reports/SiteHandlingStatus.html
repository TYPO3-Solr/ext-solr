<table class="table table-sm table-hover table-striped">
    <tbody>
        <f:for each="{validationResults}" as="validationResult">
            <tr {f:render(section: 'CSSClassesFor', arguments:{validationResult: validationResult, forTag: 'tr'})}><th scope="row" {f:render(section: 'CSSClassesFor', arguments:{validationResult: validationResult, forTag: 'th'})}>{validationResult.label}</th><td {f:render(section: 'CSSClassesFor', arguments:{validationResult: validationResult, forTag: 'td'})}>{validationResult.message}</td></tr>
        </f:for>
    </tbody>
</table>

<f:section name="CSSClassesFor"><f:if condition="{validationResult.CSSClassesFor.{forTag}}">class="{validationResult.CSSClassesFor.{forTag}}"</f:if></f:section>
