<html data-namespace-typo3-fluid="true"
	xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
	xmlns:acoBase="http://typo3.org/ns/Aco/AcoBase/ViewHelpers"
>

<f:if condition="{missingModelConfigurations}">
	<p><f:translate key="LLL:EXT:solr/Resources/Private/Language/locallang_reports.xlf:report.textToVector.model.warning" /></p>
	<p><f:translate key="LLL:EXT:solr/Resources/Private/Language/locallang_reports.xlf:report.textToVector.warning.ignore" /></p>
</f:if>

<table class="table table-sm table-hover table-striped">
	<thead>
		<tr>
			<th scope="col"><f:translate key="LLL:EXT:solr/Resources/Private/Language/locallang_reports.xlf:report.table.endpoint" /></th>
			<th scope="col"><f:translate key="LLL:EXT:solr/Resources/Private/Language/locallang_reports.xlf:report.table.class" /></th>
			<th scope="col"><f:translate key="LLL:EXT:solr/Resources/Private/Language/locallang_reports.xlf:report.table.baseUrl" /></th>
			<th scope="col"><f:translate key="LLL:EXT:solr/Resources/Private/Language/locallang_reports.xlf:report.table.model" /></th>
		</tr>
	</thead>
	<tbody>
		<f:for each="{endpoints}" as="endpoint">
			<tr class="{endpoint.status.cssClass}">
				<td>{endpoint.baseUrl}</td>
				<td>{endpoint.class}</td>
				<td>{endpoint.modelBaseUrl}</td>
				<td>{endpoint.modelName}</td>
			</tr>
		</f:for>
	</tbody>
</table>

</html>
