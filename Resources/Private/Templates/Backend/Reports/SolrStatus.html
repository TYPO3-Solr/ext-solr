<html xmlns="http://www.w3.org/1999/xhtml" lang="en"

<table class="table table-condensed table-hover table-striped">

	</tr>
	<tr>

	</tr>
	<tr>

		<td>{solr.primaryEndpoint.scheme}</td>
	</tr>
	<tr>

	<tr>
		<th><f:translate key="LLL:EXT:solr/Resources/Private/Language/locallang_reports.xlf:report.table.apacheSolr" /></th>
		<td>{solrVersion}</td>
	</tr>
	<tr>
		<th>solrconfig.xml</th>
		<td>{configName}</td>
	</tr>
	<tr>
		<th>schema.xml</th>
		<td>{schemaName}</td>
	</tr>
	<tr>
		<th><f:translate key="LLL:EXT:solr/Resources/Private/Language/locallang_reports.xlf:report.table.accessFilterPlugin" /></th>
